name: Build JSONs and deploy to Pages

on:
  push:
    branches: ["main"]        # run on commits to main
  workflow_dispatch:          # …or manually

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: |
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Load input folder from config
        id: config
        run: echo "folder=$(cat .github/config.json | jq -r '.input_folder')" >> $GITHUB_OUTPUT

      - name: Run publish script
        run: python scripts/publish.py ${{ steps.config.outputs.folder }} output

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          name: json-pages
          path: output

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
        with:
          artifact_name: json-pages